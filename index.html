<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azurion UI - Pro Executor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: #d4d4d4; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            position: relative;
        }
        
        .bg-editor-main { background-color: #1a1a1a; }
        .bg-header { background-color: #252526; }
        .bg-tab-active { background-color: #1a1a1a; }
        .bg-tab-inactive { background-color: #2d2d2d; }
        
        .border-accent { 
            border-top: 2px solid #007acc; 
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { height: 3px; width: 6px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #007acc; }

        #container { 
            width: 100%; 
            height: 100%; 
        }

        .icon-btn { 
            transition: background 0.2s ease;
            cursor: pointer; 
            opacity: 0.8; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover { 
            opacity: 1; 
            background: rgba(255,255,255,0.08); 
        }
        .icon-btn:active {
            color: #007acc !important;
            background: rgba(0, 122, 204, 0.1);
        }

        .tab { 
            min-width: 140px; 
            max-width: 200px; 
            flex-shrink: 0; 
            user-select: none; 
            position: relative;
            transition: background 0.2s ease;
        }

        #tabs-container {
            display: flex;
            height: 100%;
            overflow-x: auto;
            scroll-behavior: smooth;
        }
        #tabs-container::-webkit-scrollbar { display: none; }

        /* Home Dropdown Menu */
        #home-menu {
            display: none;
            position: absolute;
            top: 40px;
            left: 5px;
            background: #252526;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
            width: 200px;
            border-radius: 4px;
        }

        .menu-item {
            padding: 10px 15px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .menu-item:hover {
            background: #007acc;
            color: white;
        }

        /* Process View */
        #process-view {
            display: none;
            padding: 20px;
            height: 100%;
            overflow-y: auto;
        }

        .process-card {
            background: #2d2d2d;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #007acc;
        }

        .resizer { position: absolute; z-index: 9999; }
        .resizer.right { top: 0; right: 0; width: 6px; height: 100%; cursor: e-resize; }
        .resizer.left { top: 0; left: 0; width: 6px; height: 100%; cursor: w-resize; }
        .resizer.bottom { bottom: 0; left: 0; width: 100%; height: 6px; cursor: s-resize; }
        .resizer.top { top: 0; left: 0; width: 100%; height: 6px; cursor: n-resize; }
    </style>
</head>
<body onmousedown="checkDrag(event)">

    <div class="resizer top" onmousedown="handleResize(event, 'top')"></div>
    <div class="resizer bottom" onmousedown="handleResize(event, 'bottom')"></div>
    <div class="resizer left" onmousedown="handleResize(event, 'left')"></div>
    <div class="resizer right" onmousedown="handleResize(event, 'right')"></div>

    <!-- Header -->
    <header class="bg-header h-10 flex items-center justify-between select-none border-b border-black/40">
        <div class="flex items-center h-full overflow-hidden flex-1">
            <div id="home-btn" class="px-4 h-full flex items-center icon-btn flex-shrink-0" onclick="toggleHomeMenu(event)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" class="text-gray-400"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </div>

            <!-- Dropdown Menu -->
            <div id="home-menu">
                <div class="menu-item" onclick="showView('editor')">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 18L22 12L16 6M8 6L2 12L8 18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Script Editor
                </div>
                <div class="menu-item" onclick="showView('processes')">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Active Processes (PIDs)
                </div>
            </div>
            
            <div id="tabs-container"></div>

            <div onclick="addNewTab()" class="px-4 h-full flex items-center text-gray-500 hover:text-white cursor-pointer hover:bg-white/5 flex-shrink-0 transition-colors">
                <span class="text-xl font-light">+</span>
            </div>
        </div>

        <div class="flex items-center h-full flex-shrink-0">
            <div onclick="windowAction('minimize')" class="px-5 h-full flex items-center hover:bg-white/5 cursor-pointer text-gray-400 transition-colors">
                <div class="w-4 h-[2px] bg-current"></div>
            </div>
            <div onclick="windowAction('maximize')" class="px-5 h-full flex items-center hover:bg-white/5 cursor-pointer text-gray-400 transition-colors">
                <div class="w-4 h-4 border-2 border-current"></div>
            </div>
            <div onclick="windowAction('close')" class="px-5 h-full flex items-center hover:bg-red-600 cursor-pointer text-gray-400 hover:text-white transition-all">
                <span class="text-lg">✕</span>
            </div>
        </div>
    </header>

    <!-- Toolbar -->
    <div id="main-toolbar" class="bg-editor-main h-12 flex items-center justify-between px-4 border-b border-black/20 relative">
        <div class="flex items-center space-x-3">
            <div onclick="attachProcess()" class="p-2 icon-btn rounded text-gray-400" title="Attach">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m18 2 4 4"></path>
                    <path d="m17 7 3-3"></path>
                    <path d="M19 9 8.7 19.3c-1 1-2.5 1-3.4 0l-.6-.6c-1-1-1-2.5 0-3.4L15 5"></path>
                    <path d="m9 11 4 4"></path>
                    <path d="m5 19-3 3"></path>
                    <path d="m14 4 6 6"></path>
                </svg>
            </div>
        </div>

        <div onclick="executeScript()" class="p-2 icon-btn rounded text-gray-400" title="Execute">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>
        </div>
    </div>

    <main class="flex-grow relative overflow-hidden bg-editor-main">
        <!-- Editor View -->
        <div id="container"></div>

        <!-- Processes View -->
        <div id="process-view">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                Active Instances (Multi-Account)
            </h2>
            <div id="pid-list">
                <p class="text-gray-500 text-sm italic">No processes injected yet.</p>
            </div>
        </div>
    </main>

    <script>
        let editor;
        let shortcuts = [];
        let currentView = 'editor';
        const defaultScript = `-- Azurion UI\nprint("Hello from Azurion UI!")`;
        
        let tabs = JSON.parse(localStorage.getItem('azurion_tabs')) || [
            { id: 1, name: 'Untitled 1', content: defaultScript }
        ];
        let activeTabId = JSON.parse(localStorage.getItem('azurion_active_tab')) || tabs[0].id;

        // Toggle Home Menu
        function toggleHomeMenu(e) {
            e.stopPropagation();
            const menu = document.getElementById('home-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        document.addEventListener('click', () => {
            document.getElementById('home-menu').style.display = 'none';
        });

        // Toggle Views
        function showView(view) {
            currentView = view;
            const editorEl = document.getElementById('container');
            const processEl = document.getElementById('process-view');
            const toolbarEl = document.getElementById('main-toolbar');
            const tabsEl = document.getElementById('tabs-container');

            if (view === 'editor') {
                editorEl.style.display = 'block';
                processEl.style.display = 'none';
                toolbarEl.style.visibility = 'visible';
                tabsEl.style.visibility = 'visible';
            } else {
                editorEl.style.display = 'none';
                processEl.style.display = 'block';
                toolbarEl.style.visibility = 'hidden';
                tabsEl.style.visibility = 'hidden';
                requestPidUpdate();
            }
        }

        // Update PID List (Triggered by C#)
        function updatePidList(pidsJson) {
            const list = document.getElementById('pid-list');
            const pids = JSON.parse(pidsJson); 
            
            if (pids.length === 0) {
                list.innerHTML = '<p class="text-gray-500 text-sm italic">No processes injected yet.</p>';
                return;
            }

            list.innerHTML = pids.map(pid => `
                <div class="process-card">
                    <div>
                        <span class="text-white font-mono font-bold">PID: ${pid}</span>
                        <div class="text-[10px] text-gray-500 uppercase">RobloxPlayerBeta.exe</div>
                    </div>
                    <div class="text-xs text-green-500 font-semibold bg-green-500/10 px-2 py-1 rounded">
                        ATTACHED
                    </div>
                </div>
            `).join('');
        }

        function requestPidUpdate() {
            if (window.chrome?.webview) {
                window.chrome.webview.postMessage({ action: 'get_pids' });
            }
        }

        // MONACO SETUP
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            monaco.editor.defineTheme('azurionTheme', {
                base: 'vs-dark', inherit: true, rules: [],
                colors: { 'editor.background': '#1a1a1a', 'editor.lineHighlightBackground': '#252526' }
            });

            const currentTab = tabs.find(t => t.id === activeTabId) || tabs[0];

            editor = monaco.editor.create(document.getElementById('container'), {
                value: currentTab.content,
                language: 'lua',
                theme: 'azurionTheme',
                automaticLayout: true,
                minimap: { enabled: false },
                cursorSmoothCaretAnimation: "on",
                smoothScrolling: true,
                fontFamily: "'Cascadia Code', Consolas, 'Courier New', monospace",
                fontSize: 14,
                padding: { top: 10 }
            });

            editor.onDidChangeModelContent(() => {
                const tab = tabs.find(t => t.id === activeTabId);
                if (tab) {
                    tab.content = editor.getValue();
                    saveToLocal();
                }
            });

            renderTabs();
        });

        if (window.chrome?.webview) {
            window.chrome.webview.addEventListener('message', event => {
                if (event.data.action === 'update_pids') {
                    updatePidList(JSON.stringify(event.data.pids));
                }
            });
        }

        function executeScript() {
            const rawCode = editor.getValue();
            if (window.chrome?.webview) {
                window.chrome.webview.postMessage({ 
                    action: 'execute', 
                    script: rawCode
                });
            }
        }

        function saveToLocal() {
            localStorage.setItem('azurion_tabs', JSON.stringify(tabs));
            localStorage.setItem('azurion_active_tab', JSON.stringify(activeTabId));
        }

        function windowAction(action) {
            if (window.chrome?.webview) {
                window.chrome.webview.postMessage({ action: action });
            }
        }

        function handleResize(e, direction) {
            if (window.chrome?.webview) {
                window.chrome.webview.postMessage({ action: 'resize', direction: direction });
            }
        }

        function checkDrag(e) {
            if (e.target.closest('.icon-btn') || e.target.closest('.tab') || e.target.closest('.resizer') || e.target.closest('#home-menu')) return;
            if (e.target.tagName === 'HEADER' || e.target.parentElement?.tagName === 'HEADER') {
                if (window.chrome?.webview) {
                    window.chrome.webview.postMessage({ action: 'drag' });
                }
            }
        }

        function attachProcess() {
            if (window.chrome?.webview) {
                window.chrome.webview.postMessage({ action: 'attach' });
            }
        }

        function addNewTab() {
            const id = Date.now();
            tabs.push({ id, name: `Untitled ${tabs.length + 1}`, content: defaultScript });
            activeTabId = id;
            editor.setValue(defaultScript);
            renderTabs();
            saveToLocal();
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';
            
            tabs.forEach(t => {
                const isSelected = t.id === activeTabId;
                const tabDiv = document.createElement('div');
                tabDiv.className = `tab h-full flex items-center px-4 text-xs cursor-pointer border-r border-black/20 ${isSelected ? 'bg-tab-active border-accent text-white font-medium' : 'bg-tab-inactive text-gray-500 hover:text-gray-300'}`;
                
                const span = document.createElement('span');
                span.className = 'truncate pointer-events-none mr-2';
                span.textContent = t.name;

                tabDiv.ondblclick = (e) => {
                    e.stopPropagation();
                    renameTab(t.id, span);
                };

                tabDiv.onclick = () => switchTab(t.id);
                
                const closeBtn = document.createElement('span');
                closeBtn.innerHTML = '✕';
                closeBtn.className = 'hover:bg-red-500/20 hover:text-red-400 ml-auto w-5 h-5 flex items-center justify-center rounded-sm transition-all';
                closeBtn.onclick = (e) => {
                    e.stopPropagation();
                    closeTab(t.id);
                };

                tabDiv.appendChild(span);
                tabDiv.appendChild(closeBtn);
                container.appendChild(tabDiv);
            });
        }

        function renameTab(id, span) {
            const currentName = span.textContent;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentName;
            input.className = 'bg-transparent border-none outline-none text-white w-full';
            
            span.replaceWith(input);
            input.focus();
            input.select();

            const finishRename = () => {
                const newName = input.value.trim() || currentName;
                const tab = tabs.find(t => t.id === id);
                if (tab) tab.name = newName;
                renderTabs();
                saveToLocal();
            };

            input.onblur = finishRename;
            input.onkeydown = (e) => {
                if (e.key === 'Enter') finishRename();
            };
        }

        function closeTab(id) {
            if (tabs.length === 1) return;
            const index = tabs.findIndex(t => t.id === id);
            tabs = tabs.filter(t => t.id !== id);
            if (activeTabId === id) {
                activeTabId = tabs[Math.max(0, index - 1)].id;
                editor.setValue(tabs.find(t => t.id === activeTabId).content);
            }
            renderTabs();
            saveToLocal();
        }

        function switchTab(id) {
            if (activeTabId === id) return;
            const oldTab = tabs.find(t => t.id === activeTabId);
            if(oldTab) oldTab.content = editor.getValue();
            activeTabId = id;
            const next = tabs.find(t => t.id === id);
            editor.setValue(next.content);
            renderTabs();
            saveToLocal();
        }

        window.addEventListener('resize', () => editor && editor.layout());
    </script>
</body>
</html>
