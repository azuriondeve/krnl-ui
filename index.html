<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azurion UI - Executor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <!-- Adicionando suporte a animações nativas do CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: #d4d4d4; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        
        .bg-editor-main { background-color: #1a1a1a; }
        .bg-header { background-color: #252526; }
        .bg-tab-active { background-color: #1a1a1a; transition: background-color 0.3s ease; }
        .bg-tab-inactive { background-color: #2d2d2d; transition: background-color 0.3s ease; }
        
        .border-accent { 
            border-top: 2px solid #007acc; 
            animation: borderSlide 0.4s ease-out;
        }

        @keyframes borderSlide {
            from { width: 0; opacity: 0; }
            to { width: 100%; opacity: 1; }
        }

        /* Scrollbar customizada */
        ::-webkit-scrollbar { height: 3px; width: 6px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #007acc; }

        #container { 
            width: 100%; 
            height: 100%; 
            animation: fadeIn 0.8s ease;
        }

        .icon-btn { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            opacity: 0.7; 
        }
        .icon-btn:hover { 
            opacity: 1; 
            background: rgba(255,255,255,0.08); 
            transform: scale(1.1);
        }
        .icon-btn:active {
            transform: scale(0.9);
        }

        /* Animação das abas */
        .tab { 
            min-width: 140px; 
            max-width: 200px; 
            flex-shrink: 0; 
            user-select: none; 
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideInTab 0.4s ease-out;
        }

        @keyframes slideInTab {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        #tabs-container {
            display: flex;
            height: 100%;
            overflow-x: auto;
            scroll-behavior: smooth;
        }
        #tabs-container::-webkit-scrollbar { display: none; }

        .tab-rename-input {
            background: rgba(0,0,0,0.2);
            border: 1px solid #007acc;
            color: white;
            outline: none;
            width: 100%;
            font-size: inherit;
            padding: 2px 4px;
            border-radius: 2px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Efeito de pulso no botão de injeção */
        .btn-inject:hover svg {
            animation: syringePulse 1s infinite;
        }

        @keyframes syringePulse {
            0% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body onmousedown="checkDrag(event)">

    <!-- Header / Barra de Abas -->
    <header class="bg-header h-9 flex items-center justify-between select-none border-b border-black/40">
        <div class="flex items-center h-full overflow-hidden flex-1">
            <div class="px-3 h-full flex items-center icon-btn flex-shrink-0">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" class="text-gray-400"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </div>
            
            <div id="tabs-container"></div>

            <div onclick="addNewTab()" class="px-3 h-full flex items-center text-gray-500 hover:text-white cursor-pointer hover:bg-white/5 flex-shrink-0 transition-colors">
                <span class="text-lg font-light">+</span>
            </div>
        </div>

        <div class="flex items-center h-full flex-shrink-0">
            <div onclick="windowAction('minimize')" class="px-4 h-full flex items-center hover:bg-white/5 cursor-pointer text-gray-400 transition-colors">
                <div class="w-3 h-[1px] bg-current"></div>
            </div>
            <div onclick="windowAction('maximize')" class="px-4 h-full flex items-center hover:bg-white/5 cursor-pointer text-gray-400 transition-colors">
                <div class="w-3 h-3 border border-current"></div>
            </div>
            <div onclick="windowAction('close')" class="px-4 h-full flex items-center hover:bg-red-600 cursor-pointer text-gray-400 hover:text-white transition-all">
                <span class="text-sm">✕</span>
            </div>
        </div>
    </header>

    <!-- Toolbar -->
    <div class="bg-editor-main h-11 flex items-center justify-between px-3 border-b border-black/20 relative">
        <div class="flex items-center space-x-2">
            <!-- Ícone de Injeção -->
            <div onclick="attachProcess()" class="p-2 icon-btn rounded text-gray-400 btn-inject" title="Attach">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m18 2 4 4"></path>
                    <path d="m17 7 3-3"></path>
                    <path d="M19 9 8.7 19.3c-1 1-2.5 1-3.4 0l-.6-.6c-1-1-1-2.5 0-3.4L15 5"></path>
                    <path d="m9 11 4 4"></path>
                    <path d="m5 19-3 3"></path>
                    <path d="m14 4 6 6"></path>
                </svg>
            </div>
        </div>

        <div onclick="executeScript()" class="p-2 icon-btn rounded text-gray-400 hover:text-green-500 hover:rotate-12" title="Execute">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>
        </div>
    </div>

    <main class="flex-grow relative overflow-hidden bg-editor-main">
        <div id="container"></div>
    </main>

    <script>
        let editor;
        const defaultScript = `print("made by azurion ui")`;
        
        let tabs = JSON.parse(localStorage.getItem('krnl_tabs')) || [
            { id: 1, name: 'Untitled 1', content: defaultScript }
        ];
        let activeTabId = JSON.parse(localStorage.getItem('krnl_active_tab')) || tabs[0].id;

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            monaco.editor.defineTheme('krnlTheme', {
                base: 'vs-dark', inherit: true, rules: [],
                colors: { 'editor.background': '#1a1a1a', 'editor.lineHighlightBackground': '#252526' }
            });

            const currentTab = tabs.find(t => t.id === activeTabId) || tabs[0];

            editor = monaco.editor.create(document.getElementById('container'), {
                value: currentTab.content,
                language: 'lua',
                theme: 'krnlTheme',
                automaticLayout: true,
                minimap: { enabled: false },
                cursorSmoothCaretAnimation: "on",
                cursorBlinking: "expand",
                smoothScrolling: true,
                mouseWheelZoom: true,
                fontFamily: "'Cascadia Code', Consolas, 'Courier New', monospace",
                fontSize: 14,
                bracketPairColorization: { enabled: true },
                padding: { top: 10 }
            });

            editor.onDidChangeModelContent(() => {
                const tab = tabs.find(t => t.id === activeTabId);
                if (tab) {
                    tab.content = editor.getValue();
                    saveToLocal();
                }
            });

            renderTabs();
        });

        function saveToLocal() {
            localStorage.setItem('krnl_tabs', JSON.stringify(tabs));
            localStorage.setItem('krnl_active_tab', JSON.stringify(activeTabId));
        }

        function windowAction(action) {
            if (window.chrome?.webview) {
                window.chrome.webview.postMessage({ action: action });
            }
        }

        function checkDrag(e) {
            if (e.target.tagName === 'HEADER' || e.target.parentElement?.tagName === 'HEADER') {
                if (window.chrome?.webview) {
                    window.chrome.webview.postMessage({ action: 'drag' });
                }
            }
        }

        function attachProcess() {
            if (window.chrome?.webview) {
                window.chrome.webview.postMessage({ action: 'attach' });
            }
        }

        function executeScript() {
            const code = editor.getValue();
            if (window.chrome?.webview) {
                window.chrome.webview.postMessage({ action: 'execute', script: code });
            }
        }

        function addNewTab() {
            const id = Date.now();
            tabs.push({ id, name: `Untitled ${tabs.length + 1}`, content: defaultScript });
            activeTabId = id;
            editor.setValue(defaultScript);
            renderTabs();
            saveToLocal();
            
            setTimeout(() => {
                const container = document.getElementById('tabs-container');
                container.scrollTo({ left: container.scrollWidth, behavior: 'smooth' });
            }, 50);
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';
            
            tabs.forEach(t => {
                const isSelected = t.id === activeTabId;
                const tabDiv = document.createElement('div');
                tabDiv.className = `tab h-full flex items-center px-4 text-xs cursor-pointer border-r border-black/20 ${isSelected ? 'bg-tab-active border-accent text-white font-medium' : 'bg-tab-inactive text-gray-500 hover:text-gray-300'}`;
                
                const span = document.createElement('span');
                span.className = 'truncate pointer-events-none mr-2';
                span.textContent = t.name;

                tabDiv.ondblclick = (e) => {
                    e.stopPropagation();
                    renameTab(t.id, span, tabDiv);
                };

                tabDiv.onclick = () => switchTab(t.id);
                
                const closeBtn = document.createElement('span');
                closeBtn.innerHTML = '✕';
                closeBtn.className = 'hover:bg-red-500/20 hover:text-red-400 ml-auto w-5 h-5 flex items-center justify-center rounded-sm transition-all';
                closeBtn.onclick = (e) => {
                    e.stopPropagation();
                    closeTab(t.id, tabDiv);
                };

                tabDiv.appendChild(span);
                tabDiv.appendChild(closeBtn);
                container.appendChild(tabDiv);
            });
        }

        function renameTab(id, span, parent) {
            const currentName = span.textContent;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentName;
            input.className = 'tab-rename-input';
            
            span.replaceWith(input);
            input.focus();
            input.select();

            const finishRename = () => {
                const newName = input.value.trim() || currentName;
                const tab = tabs.find(t => t.id === id);
                if (tab) tab.name = newName;
                input.replaceWith(span);
                span.textContent = newName;
                saveToLocal();
                renderTabs();
            };

            input.onblur = finishRename;
            input.onkeydown = (e) => {
                if (e.key === 'Enter') finishRename();
                if (e.key === 'Escape') {
                    input.onblur = null;
                    renderTabs();
                }
            };
        }

        function closeTab(id, element) {
            if (tabs.length === 1) return;
            
            // Animação de saída
            element.style.transform = 'scale(0.8)';
            element.style.opacity = '0';
            
            setTimeout(() => {
                const index = tabs.findIndex(t => t.id === id);
                tabs = tabs.filter(t => t.id !== id);
                if (activeTabId === id) {
                    activeTabId = tabs[Math.max(0, index - 1)].id;
                    editor.setValue(tabs.find(t => t.id === activeTabId).content);
                }
                renderTabs();
                saveToLocal();
            }, 200);
        }

        function switchTab(id) {
            if (activeTabId === id) return;
            const oldTab = tabs.find(t => t.id === activeTabId);
            if(oldTab) oldTab.content = editor.getValue();
            
            activeTabId = id;
            const next = tabs.find(t => t.id === id);
            
            // Transição de opacidade no editor ao mudar de aba
            const canvas = document.getElementById('container');
            canvas.style.opacity = '0.5';
            
            setTimeout(() => {
                editor.setValue(next.content);
                canvas.style.opacity = '1';
                renderTabs();
                saveToLocal();
            }, 50);
        }

        const tabsContainer = document.getElementById('tabs-container');
        tabsContainer.addEventListener('wheel', (evt) => {
            evt.preventDefault();
            tabsContainer.scrollLeft += evt.deltaY;
        });

        window.addEventListener('resize', () => editor && editor.layout());
    </script>
</body>
</html>
