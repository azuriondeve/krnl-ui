<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: #d4d4d4; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            position: relative;
            min-width: 300px; 
            user-select: none;
        }
        
        .bg-editor-main { background-color: #1a1a1a; }
        .bg-header { background-color: #252526; }
        .bg-tab-active { background-color: #1a1a1a; }
        .bg-tab-inactive { background-color: #2d2d2d; }
        
        .border-accent { 
            border-top: 2px solid #007acc; 
        }

        ::-webkit-scrollbar { height: 4px; width: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #007acc; }

        #container { width: 100%; height: 100%; }

        .icon-btn { 
            transition: all 0.2s ease;
            cursor: pointer; 
            opacity: 0.8; 
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .icon-btn:hover { 
            opacity: 1; 
            background: rgba(255,255,255,0.08); 
        }

        .tab { 
            min-width: 80px; 
            max-width: 160px; 
            flex-shrink: 0; 
            user-select: none; 
            position: relative;
            transition: background 0.2s ease;
        }

        #tabs-outer {
            display: flex;
            align-items: center;
            overflow: hidden;
            height: 100%;
        }

        #tabs-container {
            display: flex;
            height: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            scrollbar-width: none; 
        }
        
        #tabs-container::-webkit-scrollbar { display: none; }

        .tab-rename-input {
            background: rgba(0,0,0,0.2);
            border: 1px solid #007acc;
            color: white;
            outline: none;
            width: 100%;
            font-size: inherit;
            padding: 2px 4px;
            border-radius: 2px;
        }

        /* Overlays & Sidebar Animation */
        #script-hub {
            position: absolute;
            top: 40px;
            left: 0;
            width: 100%;
            height: calc(100% - 40px);
            background: #1a1a1a;
            z-index: 50;
            display: none;
            flex-direction: column;
        }

        #navigation-sidebar {
            position: absolute;
            top: 40px;
            left: 0;
            width: 240px;
            height: calc(100% - 40px);
            background: #1a1a1a;
            z-index: 60;
            border-right: 1px solid rgba(255,255,255,0.05);
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            transform: translateX(-100%);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease;
            display: flex;
            pointer-events: none;
        }

        #navigation-sidebar.active {
            transform: translateX(0);
            opacity: 1;
            pointer-events: auto;
        }

        .nav-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: #9ca3af;
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.05);
            color: white;
            padding-left: 24px;
        }
        .nav-item svg { width: 18px; height: 18px; }

        .script-card {
            background: #252526;
            border-radius: 6px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            min-height: 180px;
        }
        .script-card:hover {
            transform: translateY(-2px);
            border-color: #007acc;
        }

        .card-image-container {
            position: relative;
            height: 90px;
            width: 100%;
            background: #121212;
            flex-shrink: 0;
        }

        .card-image-container img { width: 100%; height: 100%; object-fit: cover; }

        .card-content {
            padding: 8px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .card-title {
            font-size: 11px;
            font-weight: 700;
            color: white;
            line-height: 1.2;
            margin-bottom: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-subtitle {
            font-size: 9px;
            color: #9ca3af;
            text-transform: uppercase;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            margin-bottom: 8px;
        }

        .card-actions { display: flex; gap: 4px; }

        .card-btn {
            flex: 1;
            padding: 6px 2px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #007acc;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .resizer { position: absolute; z-index: 9999; }
        .resizer.right { top: 0; right: 0; width: 6px; height: 100%; cursor: e-resize; }
        .resizer.left { top: 0; left: 0; width: 6px; height: 100%; cursor: w-resize; }
        .resizer.bottom { bottom: 0; left: 0; width: 100%; height: 6px; cursor: s-resize; }
        .resizer.top { top: 0; left: 0; width: 100%; height: 6px; cursor: n-resize; }
        
        .window-controls {
            display: flex;
            height: 100%;
            flex-shrink: 0;
            margin-left: auto; /* Empurra para a direita */
        }
        /* Garantir que o botão + não suma */
        #add-tab-btn {
            z-index: 20;
            background-color: #252526;
        }
    </style>
</head>
<body onmousedown="checkDrag(event)">

    <div class="resizer top" onmousedown="handleResize(event, 'top')"></div>
    <div class="resizer bottom" onmousedown="handleResize(event, 'bottom')"></div>
    <div class="resizer left" onmousedown="handleResize(event, 'left')"></div>
    <div class="resizer right" onmousedown="handleResize(event, 'right')"></div>

    <!-- Header -->
    <header id="drag-header" class="bg-header h-10 flex items-center justify-between select-none border-b border-black/40 overflow-hidden">
        <div class="flex items-center h-full overflow-hidden flex-1 min-w-0">
            <div onclick="toggleSidebar()" class="px-3 h-full flex items-center icon-btn group" title="Menu">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400 group-hover:text-white transition-colors">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </div>
            
        <div id="tabs-outer" class="flex-shrink min-w-0">
            <div id="tabs-container"></div>
        </div>

        <!-- 3. Botão + logo após as abas -->
        <div id="add-tab-btn" onclick="addNewTab()" class="px-3 h-full flex items-center text-gray-500 hover:text-white cursor-pointer hover:bg-white/5 flex-shrink-0 transition-colors">
            <span class="text-xl font-light">+</span>
        </div>


        <div class="window-controls">
            <div onclick="windowAction('minimize')" class="px-4 h-full flex items-center hover:bg-white/5 cursor-pointer text-gray-400 transition-colors">
                <div class="w-3 h-[1.5px] bg-current"></div>
            </div>
            <div onclick="windowAction('maximize')" class="px-4 h-full flex items-center hover:bg-white/5 cursor-pointer text-gray-400 transition-colors">
                <div class="w-3.5 h-3.5 border-[1.5px] border-current"></div>
            </div>
            <div onclick="windowAction('close')" class="px-4 h-full flex items-center hover:bg-red-600 cursor-pointer text-gray-400 hover:text-white transition-all">
                <span class="text-base">✕</span>
            </div>
        </div>
    </header>

    <!-- Navigation Sidebar -->
    <div id="navigation-sidebar">
        <div class="py-4 flex flex-col h-full w-full">
            <div onclick="navTo('editor')" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
                <span class="text-sm font-medium">Editor</span>
            </div>
            <div onclick="navTo('hub')" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                <span class="text-sm font-medium">Script Hub</span>
            </div>
            <div onclick="navTo('discord')" class="nav-item mt-auto border-t border-white/5">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037 19.736 19.736 0 0 0-4.885 1.515.069.069 0 0 0-.032.027C.533 9.048-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.419-2.157 2.419zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.419-2.157 2.419z"/></svg>
                <span class="text-sm font-medium">Discord</span>
            </div>
        </div>
    </div>

    <!-- Script Hub -->
    <div id="script-hub">
        <div class="p-3 border-b border-white/5 flex items-center space-x-2">
            <div class="relative flex-1">
                <input id="hub-search" type="text" placeholder="Search scripts..." 
                    class="w-full bg-[#2d2d2d] border border-white/10 rounded-md px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500 transition-all">
                <div id="hub-loading" class="absolute right-3 top-2 hidden">
                    <div class="loading-spinner" style="width: 16px; height: 16px;"></div>
                </div>
            </div>
            <button onclick="fetchTrending()" class="bg-[#2d2d2d] hover:bg-[#3d3d3d] px-3 py-1.5 rounded text-[10px] font-medium uppercase transition-colors">
                Trending
            </button>
        </div>
        <div id="hub-content" class="flex-1 overflow-y-auto p-4 grid grid-cols-2 xs:grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3"></div>
    </div>

    <!-- Toolbar -->
    <div class="bg-editor-main h-12 flex items-center justify-between px-4 border-b border-black/20 relative flex-shrink-0">
        <div class="flex items-center space-x-2">
            <div onclick="attachProcess()" class="p-2 icon-btn rounded text-gray-400 hover:text-white" title="Attach">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m19 5 3-3"/>
                    <path d="m2 22 3-3"/>
                    <path d="M6.3 20.3a2.4 2.4 0 0 0 3.4 0L12 18l-6-6-2.3 2.3a2.4 2.4 0 0 0 0 3.4Z"/>
                    <path d="M7.5 13.5 10 11"/>
                    <path d="M10.5 16.5 13 14"/>
                    <path d="m12 6 6 6 2.3-2.3a2.4 2.4 0 0 0 0-3.4l-2.6-2.6a2.4 2.4 0 0 0-3.4 0Z"/>
                </svg>
            </div>
        </div>

        <div onclick="executeScript()" class="p-2 icon-btn rounded text-gray-400 hover:text-white hover:scale-110 active:scale-95" title="Execute">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>
        </div>
    </div>

    <main class="flex-grow relative overflow-hidden bg-editor-main" onclick="closeSidebarIfOpen()">
        <div id="container"></div>
    </main>

    <script>
        // Security logic
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.keyCode === 123) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
        });

        let editor;
        const defaultScript = `-- krnl executor`;
        const BASE_URL = 'https://scriptblox.com/api/';
        
        let tabs = JSON.parse(localStorage.getItem('krnl_tabs')) || [
            { id: 1, name: 'Untitled 1', content: defaultScript }
        ];
        let activeTabId = JSON.parse(localStorage.getItem('krnl_active_tab')) || tabs[0].id;

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            monaco.editor.defineTheme('krnlTheme', {
                base: 'vs-dark', inherit: true, rules: [],
                colors: { 'editor.background': '#1a1a1a', 'editor.lineHighlightBackground': '#252526' }
            });

            const currentTab = tabs.find(t => t.id === activeTabId) || tabs[0];

            editor = monaco.editor.create(document.getElementById('container'), {
                value: currentTab.content,
                language: 'lua',
                theme: 'krnlTheme',
                automaticLayout: true,
                minimap: { enabled: false },
                cursorSmoothCaretAnimation: "on",
                smoothScrolling: true,
                fontFamily: "'Cascadia Code', Consolas, 'Courier New', monospace",
                fontSize: 14,
                padding: { top: 10 }
            });

            editor.onDidChangeModelContent(() => {
                const tab = tabs.find(t => t.id === activeTabId);
                if (tab) {
                    tab.content = editor.getValue();
                    saveToLocal();
                }
            });

            renderTabs();
        });

        // Navigation
        function toggleSidebar() {
            const sidebar = document.getElementById('navigation-sidebar');
            sidebar.classList.toggle('active');
            if(sidebar.classList.contains('active')) {
                document.getElementById('script-hub').style.display = 'none';
            }
        }

        function closeSidebarIfOpen() {
            const sidebar = document.getElementById('navigation-sidebar');
            if(sidebar.classList.contains('active')) sidebar.classList.remove('active');
        }

        function navTo(view) {
            closeSidebarIfOpen(); 
            if(view === 'editor') {
                document.getElementById('script-hub').style.display = 'none';
            } else if (view === 'hub') {
                document.getElementById('script-hub').style.display = 'flex';
                fetchTrending();
            } else if (view === 'discord') {
                window.open('https://azuriondeve.github.io/krnl-ui/discord.html', '_blank');
            }
        }

        // Script Hub
        async function fetchTrending() {
            showLoading(true);
            try {
                const response = await fetch(`${BASE_URL}script/fetch?page=1&max=20`);
                const data = await response.json();
                renderHubScripts(data.result.scripts);
            } catch (e) {
                console.error("Hub Error:", e);
            } finally {
                showLoading(false);
            }
        }

        const searchInput = document.getElementById('hub-search');
        searchInput.onkeypress = async (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value;
                if (!query) return;
                showLoading(true);
                try {
                    const response = await fetch(`${BASE_URL}script/search?q=${encodeURIComponent(query)}&page=1&max=20`);
                    const data = await response.json();
                    renderHubScripts(data.result.scripts);
                } catch (e) { console.error(e); }
                finally { showLoading(false); }
            }
        };

        function showLoading(show) {
            document.getElementById('hub-loading').style.display = show ? 'block' : 'none';
        }

        function renderHubScripts(scripts) {
            const content = document.getElementById('hub-content');
            content.innerHTML = '';
            scripts.forEach(s => {
                const gameName = s.game?.name || 'Universal';
                let imgUrl = 'https://via.placeholder.com/300x150/252526/ffffff?text=No+Image';
                if (s.game?.image) imgUrl = s.game.image.startsWith('http') ? s.game.image : `https://scriptblox.com${s.game.image}`;
                else if (s.image) imgUrl = s.image.startsWith('http') ? s.image : `https://scriptblox.com${s.image}`;

                const card = document.createElement('div');
                card.className = 'script-card';
                card.innerHTML = `
                    <div class="card-image-container"><img src="${imgUrl}" class="transition-opacity opacity-0" onload="this.classList.remove('opacity-0')"></div>
                    <div class="card-content">
                        <div><h3 class="card-title">${s.title}</h3><p class="card-subtitle">${gameName}</p></div>
                        <div class="card-actions">
                            <button onclick="loadToTab('${btoa(unescape(encodeURIComponent(s.script)))}', '${s.title.replace(/'/g, "")}')" class="card-btn bg-white/5 hover:bg-white/10 text-white">+ TAB</button>
                            <button onclick="executeRaw(decodeURIComponent(escape(atob('${btoa(unescape(encodeURIComponent(s.script)))}'))))" class="card-btn bg-white hover:bg-gray-200 text-black">RUN</button>
                        </div>
                    </div>
                `;
                content.appendChild(card);
            });
        }

        function loadToTab(base64Script, name) {
            const code = decodeURIComponent(escape(atob(base64Script)));
            const id = Date.now();
            tabs.push({ id, name: name.substring(0, 15), content: code });
            activeTabId = id;
            editor.setValue(code);
            renderTabs();
            saveToLocal();
            document.getElementById('script-hub').style.display = 'none';
        }

        // Bridge
        function executeScript() {
            const code = editor.getValue();
            if (window.chrome?.webview) window.chrome.webview.postMessage({ action: 'execute', script: code });
            else console.log("Execute ->", code);
        }

        function executeRaw(code) {
            if (window.chrome?.webview) window.chrome.webview.postMessage({ action: 'execute', script: code });
            else console.log("Direct Execute ->", code);
        }

        function windowAction(action) {
            if (window.chrome?.webview) window.chrome.webview.postMessage({ action: action });
        }

        function handleResize(e, direction) {
            if (window.chrome?.webview) window.chrome.webview.postMessage({ action: 'resize', direction: direction });
        }

        function checkDrag(e) {
            if (e.target.closest('.icon-btn') || e.target.closest('.tab') || e.target.closest('.resizer') || 
                e.target.closest('#script-hub') || e.target.closest('#navigation-sidebar') ||
                e.target.closest('.window-controls') || e.target.closest('#add-tab-btn')) return;

            const header = document.getElementById('drag-header');
            if (header.contains(e.target)) {
                if (window.chrome?.webview) window.chrome.webview.postMessage({ action: 'drag' });
                else console.log("Drag Triggered");
            }
        }

        function attachProcess() {
            if (window.chrome?.webview) window.chrome.webview.postMessage({ action: 'attach' });
        }

        // Tab Management
        const tabsContainer = document.getElementById('tabs-container');
        tabsContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            tabsContainer.scrollLeft += e.deltaY;
        });

        function addNewTab() {
            const id = Date.now();
            const newName = `Untitled ${tabs.length + 1}`;
            tabs.push({ id, name: newName, content: defaultScript });
            switchTab(id);
            // Pequeno delay para garantir que o DOM renderizou a nova aba antes de scrollar
            setTimeout(() => {
                tabsContainer.scrollLeft = tabsContainer.scrollWidth;
            }, 50);
        }

        function renderTabs() {
            tabsContainer.innerHTML = '';
            tabs.forEach(t => {
                const isSelected = t.id === activeTabId;
                const tabDiv = document.createElement('div');
                tabDiv.className = `tab h-full flex items-center px-3 text-[11px] cursor-pointer border-r border-black/20 ${isSelected ? 'bg-tab-active border-accent text-white font-medium' : 'bg-tab-inactive text-gray-500 hover:text-gray-300'}`;
                
                const span = document.createElement('span');
                span.className = 'truncate pointer-events-none mr-1 flex-1';
                span.textContent = t.name;

                tabDiv.ondblclick = (e) => { e.stopPropagation(); renameTab(t.id, span); };
                tabDiv.onclick = () => switchTab(t.id);
                
                const closeBtn = document.createElement('span');
                closeBtn.innerHTML = '✕';
                closeBtn.className = 'hover:bg-red-500/20 hover:text-red-400 ml-1 w-4 h-4 flex items-center justify-center rounded-sm transition-all text-[9px] flex-shrink-0';
                closeBtn.onclick = (e) => { e.stopPropagation(); closeTab(t.id); };

                tabDiv.appendChild(span);
                tabDiv.appendChild(closeBtn);
                tabsContainer.appendChild(tabDiv);
                
                if (isSelected) {
                    tabDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            });
        }

        function switchTab(id) {
            const currentTab = tabs.find(t => t.id === activeTabId);
            if(currentTab) currentTab.content = editor.getValue();
            
            activeTabId = id;
            const targetTab = tabs.find(t => t.id === id);
            editor.setValue(targetTab.content);
            
            renderTabs();
            saveToLocal();
        }

        function closeTab(id) {
            if (tabs.length === 1) return;
            const index = tabs.findIndex(t => t.id === id);
            tabs = tabs.filter(t => t.id !== id);
            if (activeTabId === id) {
                const nextTab = tabs[Math.max(0, index - 1)];
                activeTabId = nextTab.id;
                editor.setValue(nextTab.content);
            }
            renderTabs();
            saveToLocal();
        }

        function renameTab(id, span) {
            const currentName = span.textContent;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentName;
            input.className = 'tab-rename-input';
            span.replaceWith(input);
            input.focus();
            input.select();
            
            const finishRename = () => {
                const newName = input.value.trim() || currentName;
                const tab = tabs.find(t => t.id === id);
                if (tab) tab.name = newName;
                renderTabs();
                saveToLocal();
            };
            
            input.onblur = finishRename;
            input.onkeydown = (e) => { if (e.key === 'Enter') finishRename(); };
        }

        function saveToLocal() {
            localStorage.setItem('krnl_tabs', JSON.stringify(tabs));
            localStorage.setItem('krnl_active_tab', JSON.stringify(activeTabId));
        }

        window.addEventListener('resize', () => editor && editor.layout());
    </script>
</body>
</html>
