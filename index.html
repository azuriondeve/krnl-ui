<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: #d4d4d4; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            position: relative;
            min-width: 300px; 
            user-select: none;
        }
        
        .bg-editor-main { background-color: #1a1a1a; }
        .bg-header { background-color: #252526; }
        .bg-tab-active { background-color: #1a1a1a; }
        .bg-tab-inactive { background-color: #2d2d2d; }
        
        .border-accent { 
            border-top: 2px solid #007acc; 
        }

        /* Custom Scrollbars */
        ::-webkit-scrollbar { height: 4px; width: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #007acc; }

        #container { width: 100%; height: 100%; }

        .icon-btn { 
            transition: all 0.2s ease;
            cursor: pointer; 
            opacity: 0.8; 
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .icon-btn:hover { 
            opacity: 1; 
            background: rgba(255,255,255,0.08); 
        }

        .tab { 
            min-width: 100px; 
            max-width: 180px; 
            flex-shrink: 0; 
            user-select: none; 
            position: relative;
            transition: background 0.2s ease;
        }

        /* Tabs Container with Scroll */
        #tabs-outer {
            display: flex;
            align-items: center;
            flex: 1;
            overflow: hidden;
            height: 100%;
        }

        #tabs-container {
            display: flex;
            height: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            /* Thin scrollbar for tabs */
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }
        
        #tabs-container::-webkit-scrollbar {
            height: 3px;
        }
        #tabs-container::-webkit-scrollbar-thumb {
            background: #333;
        }

        .tab-rename-input {
            background: rgba(0,0,0,0.2);
            border: 1px solid #007acc;
            color: white;
            outline: none;
            width: 100%;
            font-size: inherit;
            padding: 2px 4px;
            border-radius: 2px;
        }

        /* Script Hub Overlay */
        #script-hub {
            position: absolute;
            top: 40px;
            left: 0;
            width: 100%;
            height: calc(100% - 40px);
            background: #1a1a1a;
            z-index: 50;
            display: none;
            flex-direction: column;
        }

        .script-card {
            background: #252526;
            border-radius: 6px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            min-height: 180px;
        }
        .script-card:hover {
            transform: translateY(-2px);
            border-color: #007acc;
        }

        .card-image-container {
            position: relative;
            height: 90px;
            width: 100%;
            background: #121212;
            flex-shrink: 0;
        }

        .card-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 8px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .card-title {
            font-size: 11px;
            font-weight: 700;
            color: white;
            line-height: 1.2;
            margin-bottom: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-subtitle {
            font-size: 9px;
            color: #9ca3af;
            text-transform: uppercase;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            margin-bottom: 8px;
        }

        .card-actions {
            display: flex;
            gap: 4px;
        }

        .card-btn {
            flex: 1;
            padding: 6px 2px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #007acc;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .resizer { position: absolute; z-index: 9999; }
        .resizer.right { top: 0; right: 0; width: 6px; height: 100%; cursor: e-resize; }
        .resizer.left { top: 0; left: 0; width: 6px; height: 100%; cursor: w-resize; }
        .resizer.bottom { bottom: 0; left: 0; width: 100%; height: 6px; cursor: s-resize; }
        .resizer.top { top: 0; left: 0; width: 100%; height: 6px; cursor: n-resize; }
        
        .window-controls {
            display: flex;
            height: 100%;
            flex-shrink: 0;
            background: inherit;
            z-index: 10;
        }
    </style>
</head>
<body onmousedown="checkDrag(event)">

    <div class="resizer top" onmousedown="handleResize(event, 'top')"></div>
    <div class="resizer bottom" onmousedown="handleResize(event, 'bottom')"></div>
    <div class="resizer left" onmousedown="handleResize(event, 'left')"></div>
    <div class="resizer right" onmousedown="handleResize(event, 'right')"></div>

    <!-- Header -->
    <header class="bg-header h-10 flex items-center justify-between select-none border-b border-black/40 overflow-hidden">
        <div class="flex items-center h-full overflow-hidden flex-1 min-w-0">
            <div onclick="toggleScriptHub()" class="px-3 h-full flex items-center icon-btn group" title="Script Hub">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400 group-hover:text-white transition-colors">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </div>
            
            <div id="tabs-outer">
                <div id="tabs-container"></div>
            </div>

            <div onclick="addNewTab()" class="px-3 h-full flex items-center text-gray-500 hover:text-white cursor-pointer hover:bg-white/5 flex-shrink-0 transition-colors">
                <span class="text-xl font-light">+</span>
            </div>
        </div>

        <div class="window-controls">
            <div onclick="windowAction('minimize')" class="px-4 h-full flex items-center hover:bg-white/5 cursor-pointer text-gray-400 transition-colors">
                <div class="w-3 h-[1.5px] bg-current"></div>
            </div>
            <div onclick="windowAction('maximize')" class="px-4 h-full flex items-center hover:bg-white/5 cursor-pointer text-gray-400 transition-colors">
                <div class="w-3.5 h-3.5 border-[1.5px] border-current"></div>
            </div>
            <div onclick="windowAction('close')" class="px-4 h-full flex items-center hover:bg-red-600 cursor-pointer text-gray-400 hover:text-white transition-all">
                <span class="text-base">✕</span>
            </div>
        </div>
    </header>

    <!-- Script Hub View -->
    <div id="script-hub">
        <div class="p-3 border-b border-white/5 flex items-center space-x-2">
            <div class="relative flex-1">
                <input id="hub-search" type="text" placeholder="Search scripts..." 
                    class="w-full bg-[#2d2d2d] border border-white/10 rounded-md px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500 transition-all">
                <div id="hub-loading" class="absolute right-3 top-2 hidden">
                    <div class="loading-spinner" style="width: 16px; height: 16px;"></div>
                </div>
            </div>
            <button onclick="fetchTrending()" class="bg-[#2d2d2d] hover:bg-[#3d3d3d] px-3 py-1.5 rounded text-[10px] font-medium uppercase transition-colors">
                Trending
            </button>
        </div>
        <div id="hub-content" class="flex-1 overflow-y-auto p-4 grid grid-cols-2 xs:grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3">
            <!-- Scripts -->
        </div>
    </div>

    <!-- Toolbar -->
    <div class="bg-editor-main h-12 flex items-center justify-between px-4 border-b border-black/20 relative flex-shrink-0">
        <div class="flex items-center space-x-2">
            <div onclick="attachProcess()" class="p-2 icon-btn rounded text-gray-400 hover:text-white" title="Attach">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m18 2 4 4"></path>
                    <path d="m17 7 3-3"></path>
                    <path d="M19 9 8.7 19.3c-1 1-2.5 1-3.4 0l-.6-.6c-1-1-1-2.5 0-3.4L15 5"></path>
                    <path d="m9 11 4 4"></path>
                    <path d="m5 19-3 3"></path>
                    <path d="m14 4 6 6"></path>
                </svg>
            </div>
        </div>

        <div onclick="executeScript()" class="p-2 icon-btn rounded text-gray-400 hover:text-white hover:scale-110 active:scale-95" title="Execute">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>
        </div>
    </div>

    <main class="flex-grow relative overflow-hidden bg-editor-main">
        <div id="container"></div>
    </main>

    <script>
        // Security Bloquer
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            // F12
            if (e.keyCode === 123) { e.preventDefault(); return false; }
            // Ctrl+Shift+I, J, C
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) { e.preventDefault(); return false; }
            // Ctrl+U (View Source)
            if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
        });

        let editor;
        const defaultScript = `-- krnl executor`;
        const BASE_URL = 'https://scriptblox.com/api/';
        
        let tabs = JSON.parse(localStorage.getItem('krnl_tabs')) || [
            { id: 1, name: 'Untitled 1', content: defaultScript }
        ];
        let activeTabId = JSON.parse(localStorage.getItem('krnl_active_tab')) || tabs[0].id;

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            monaco.editor.defineTheme('krnlTheme', {
                base: 'vs-dark', inherit: true, rules: [],
                colors: { 'editor.background': '#1a1a1a', 'editor.lineHighlightBackground': '#252526' }
            });

            const currentTab = tabs.find(t => t.id === activeTabId) || tabs[0];

            editor = monaco.editor.create(document.getElementById('container'), {
                value: currentTab.content,
                language: 'lua',
                theme: 'krnlTheme',
                automaticLayout: true,
                minimap: { enabled: false },
                cursorSmoothCaretAnimation: "on",
                smoothScrolling: true,
                fontFamily: "'Cascadia Code', Consolas, 'Courier New', monospace",
                fontSize: 14,
                padding: { top: 10 }
            });

            editor.onDidChangeModelContent(() => {
                const tab = tabs.find(t => t.id === activeTabId);
                if (tab) {
                    tab.content = editor.getValue();
                    saveToLocal();
                }
            });

            renderTabs();
        });

        // Horizontal Scroll for Tabs
        const tabsContainer = document.getElementById('tabs-container');
        tabsContainer.addEventListener('wheel', (e) => {
            e.preventDefault();
            tabsContainer.scrollLeft += e.deltaY;
        });

        function executeScript() {
            const code = editor.getValue();
            if (window.chrome?.webview) {
                window.chrome.webview.postMessage({ action: 'execute', script: code });
            } else {
                console.log("C# Bridge: Execute ->", code);
            }
        }

        function executeRaw(code) {
            if (window.chrome?.webview) {
                window.chrome.webview.postMessage({ action: 'execute', script: code });
            } else {
                console.log("C# Bridge: Direct Execute ->", code);
            }
        }

        let isHubOpen = false;
        function toggleScriptHub() {
            const hub = document.getElementById('script-hub');
            isHubOpen = !isHubOpen;
            hub.style.display = isHubOpen ? 'flex' : 'none';
            if (isHubOpen) fetchTrending();
        }

        async function fetchTrending() {
            showLoading(true);
            try {
                const response = await fetch(`${BASE_URL}script/fetch?page=1&max=20`);
                const data = await response.json();
                renderHubScripts(data.result.scripts);
            } catch (e) {
                console.error("Hub Error:", e);
            } finally {
                showLoading(false);
            }
        }

        const searchInput = document.getElementById('hub-search');
        searchInput.onkeypress = async (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value;
                if (!query) return;
                showLoading(true);
                try {
                    const response = await fetch(`${BASE_URL}script/search?q=${encodeURIComponent(query)}&page=1&max=20`);
                    const data = await response.json();
                    renderHubScripts(data.result.scripts);
                } catch (e) { console.error(e); }
                finally { showLoading(false); }
            }
        };

        function showLoading(show) {
            document.getElementById('hub-loading').style.display = show ? 'block' : 'none';
        }

        function renderHubScripts(scripts) {
            const content = document.getElementById('hub-content');
            content.innerHTML = '';
            
            scripts.forEach(s => {
                const gameName = s.game?.name || 'Universal';
                let imgUrl = 'https://via.placeholder.com/300x150/252526/ffffff?text=No+Image';
                
                if (s.game?.image) {
                    imgUrl = s.game.image.startsWith('http') ? s.game.image : `https://scriptblox.com${s.game.image}`;
                } else if (s.image) {
                    imgUrl = s.image.startsWith('http') ? s.image : `https://scriptblox.com${s.image}`;
                }

                const card = document.createElement('div');
                card.className = 'script-card';
                card.innerHTML = `
                    <div class="card-image-container">
                        <img src="${imgUrl}" 
                            class="transition-opacity duration-300 opacity-0" 
                            onload="this.classList.remove('opacity-0')"
                            onerror="this.src='https://via.placeholder.com/300x150/252526/ffffff?text=Image+Error'">
                    </div>
                    <div class="card-content">
                        <div>
                            <h3 class="card-title" title="${s.title}">${s.title}</h3>
                            <p class="card-subtitle">${gameName}</p>
                        </div>
                        <div class="card-actions">
                            <button onclick="loadToTab('${btoa(unescape(encodeURIComponent(s.script)))}', '${s.title.replace(/'/g, "")}')" 
                                class="card-btn bg-white/5 hover:bg-white/10 text-white border border-white/5">
                                + TAB
                            </button>
                            <button onclick="executeRaw(decodeURIComponent(escape(atob('${btoa(unescape(encodeURIComponent(s.script)))}'))))" 
                                class="card-btn bg-white hover:bg-gray-200 text-black">
                                RUN
                            </button>
                        </div>
                    </div>
                `;
                content.appendChild(card);
            });
        }

        function loadToTab(base64Script, name) {
            const code = decodeURIComponent(escape(atob(base64Script)));
            const id = Date.now();
            tabs.push({ id, name: name.substring(0, 15), content: code });
            activeTabId = id;
            editor.setValue(code);
            renderTabs();
            saveToLocal();
            toggleScriptHub();
        }

        function saveToLocal() {
            localStorage.setItem('krnl_tabs', JSON.stringify(tabs));
            localStorage.setItem('krnl_active_tab', JSON.stringify(activeTabId));
        }

        function windowAction(action) {
            if (window.chrome?.webview) window.chrome.webview.postMessage({ action: action });
        }

        function handleResize(e, direction) {
            if (window.chrome?.webview) window.chrome.webview.postMessage({ action: 'resize', direction: direction });
        }

        function checkDrag(e) {
            if (e.target.closest('.icon-btn') || e.target.closest('.tab') || e.target.closest('.resizer') || e.target.closest('#script-hub')) return;
            if (e.target.tagName === 'HEADER' || e.target.parentElement?.tagName === 'HEADER') {
                if (window.chrome?.webview) window.chrome.webview.postMessage({ action: 'drag' });
            }
        }

        function attachProcess() {
            if (window.chrome?.webview) window.chrome.webview.postMessage({ action: 'attach' });
        }

        function addNewTab() {
            const id = Date.now();
            tabs.push({ id, name: `Untitled ${tabs.length + 1}`, content: defaultScript });
            activeTabId = id;
            editor.setValue(defaultScript);
            renderTabs();
            saveToLocal();
            
            setTimeout(() => {
                tabsContainer.scrollLeft = tabsContainer.scrollWidth;
            }, 50);
        }

        function renderTabs() {
            tabsContainer.innerHTML = '';
            
            tabs.forEach(t => {
                const isSelected = t.id === activeTabId;
                const tabDiv = document.createElement('div');
                tabDiv.className = `tab h-full flex items-center px-3 text-[11px] cursor-pointer border-r border-black/20 ${isSelected ? 'bg-tab-active border-accent text-white font-medium' : 'bg-tab-inactive text-gray-500 hover:text-gray-300'}`;
                
                const span = document.createElement('span');
                span.className = 'truncate pointer-events-none mr-1 flex-1';
                span.textContent = t.name;

                tabDiv.ondblclick = (e) => {
                    e.stopPropagation();
                    renameTab(t.id, span);
                };

                tabDiv.onclick = () => switchTab(t.id);
                
                const closeBtn = document.createElement('span');
                closeBtn.innerHTML = '✕';
                closeBtn.className = 'hover:bg-red-500/20 hover:text-red-400 ml-1 w-4 h-4 flex items-center justify-center rounded-sm transition-all text-[9px] flex-shrink-0';
                closeBtn.onclick = (e) => {
                    e.stopPropagation();
                    closeTab(t.id);
                };

                tabDiv.appendChild(span);
                tabDiv.appendChild(closeBtn);
                tabsContainer.appendChild(tabDiv);
                
                if (isSelected) {
                    tabDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            });
        }

        function switchTab(id) {
            if (activeTabId === id) return;
            const oldTab = tabs.find(t => t.id === activeTabId);
            if(oldTab) oldTab.content = editor.getValue();
            activeTabId = id;
            const next = tabs.find(t => t.id === id);
            editor.setValue(next.content);
            renderTabs();
            saveToLocal();
        }

        function closeTab(id) {
            if (tabs.length === 1) return;
            const index = tabs.findIndex(t => t.id === id);
            tabs = tabs.filter(t => t.id !== id);
            if (activeTabId === id) {
                activeTabId = tabs[Math.max(0, index - 1)].id;
                editor.setValue(tabs.find(t => t.id === activeTabId).content);
            }
            renderTabs();
            saveToLocal();
        }

        function renameTab(id, span) {
            const currentName = span.textContent;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentName;
            input.className = 'tab-rename-input';
            
            span.replaceWith(input);
            input.focus();
            input.select();

            const finishRename = () => {
                const newName = input.value.trim() || currentName;
                const tab = tabs.find(t => t.id === id);
                if (tab) tab.name = newName;
                renderTabs();
                saveToLocal();
            };

            input.onblur = finishRename;
            input.onkeydown = (e) => { if (e.key === 'Enter') finishRename(); };
        }

        window.addEventListener('resize', () => editor && editor.layout());
    </script>
</body>
</html>
