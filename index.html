<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azurion UI - Executor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: #d4d4d4; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            position: relative;
        }
        
        .bg-editor-main { background-color: #1a1a1a; }
        .bg-header { background-color: #252526; }
        .bg-sidebar { background-color: #252526; }
        .bg-tab-active { background-color: #1a1a1a; }
        .bg-tab-inactive { background-color: #2d2d2d; }
        
        .border-accent { border-top: 2px solid #007acc; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { height: 3px; width: 6px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #007acc; }

        .icon-btn { 
            transition: all 0.2s ease;
            cursor: pointer; 
            opacity: 0.8; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover { 
            opacity: 1; 
            background: rgba(255,255,255,0.08); 
        }
        .icon-btn:active {
            color: #007acc !important;
            background: rgba(0, 122, 204, 0.1);
        }

        .tab { 
            min-width: 140px; 
            max-width: 200px; 
            flex-shrink: 0; 
            user-select: none; 
            position: relative;
            transition: background 0.2s ease;
        }

        #tabs-container {
            display: flex;
            height: 100%;
            overflow-x: auto;
            scroll-behavior: smooth;
        }
        #tabs-container::-webkit-scrollbar { display: none; }

        .tab-rename-input {
            background: rgba(0,0,0,0.2);
            border: 1px solid #007acc;
            color: white;
            outline: none;
            width: 100%;
            font-size: inherit;
            padding: 2px 4px;
            border-radius: 2px;
        }

        /* Sidebar Navigation */
        .nav-item {
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #858585;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active { color: #fff; background: rgba(0, 122, 204, 0.2); border-left: 3px solid #007acc; }

        .hidden-pane { display: none !important; }

        /* Resize Handles */
        .resizer { position: absolute; z-index: 9999; }
        .resizer.right { top: 0; right: 0; width: 6px; height: 100%; cursor: e-resize; }
        .resizer.left { top: 0; left: 0; width: 6px; height: 100%; cursor: w-resize; }
        .resizer.bottom { bottom: 0; left: 0; width: 100%; height: 6px; cursor: s-resize; }
        .resizer.top { top: 0; left: 0; width: 100%; height: 6px; cursor: n-resize; }

        /* Modal Simple */
        #modal-overlay {
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        /* Execution Active State */
        .exec-active { color: #3b82f6 !important; transform: scale(1.1); }
    </style>
</head>
<body onmousedown="checkDrag(event)">

    <div class="resizer top" onmousedown="handleResize(event, 'top')"></div>
    <div class="resizer bottom" onmousedown="handleResize(event, 'bottom')"></div>
    <div class="resizer left" onmousedown="handleResize(event, 'left')"></div>
    <div class="resizer right" onmousedown="handleResize(event, 'right')"></div>

    <!-- Header -->
    <header class="bg-header h-10 flex items-center justify-between select-none border-b border-black/40">
        <div class="flex items-center h-full overflow-hidden flex-1">
            <!-- Home Icon -->
            <div onclick="toggleSidebar()" class="px-4 h-full flex items-center icon-btn flex-shrink-0" title="Home">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </div>
            
            <div id="tabs-container"></div>

            <div onclick="addNewTab()" class="px-4 h-full flex items-center text-gray-500 hover:text-white cursor-pointer hover:bg-white/5 flex-shrink-0 transition-colors">
                <span class="text-xl font-light">+</span>
            </div>
        </div>

        <div class="flex items-center h-full flex-shrink-0">
            <div onclick="windowAction('minimize')" class="px-5 h-full flex items-center hover:bg-white/5 cursor-pointer text-gray-400 transition-colors">
                <div class="w-4 h-[2px] bg-current"></div>
            </div>
            <div onclick="windowAction('maximize')" class="px-5 h-full flex items-center hover:bg-white/5 cursor-pointer text-gray-400 transition-colors">
                <div class="w-4 h-4 border-2 border-current"></div>
            </div>
            <div onclick="windowAction('close')" class="px-5 h-full flex items-center hover:bg-red-600 cursor-pointer text-gray-400 hover:text-white transition-all">
                <span class="text-lg">✕</span>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-sidebar border-r border-black/20 flex flex-col hidden-pane">
            <nav class="flex-grow pt-2">
                <div onclick="switchView('editor')" class="nav-item active" id="nav-editor">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>
                    <span>Editor</span>
                </div>
                <div onclick="switchView('scripts')" class="nav-item" id="nav-scripts">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                    <span>Saved Scripts</span>
                </div>
            </nav>
            <div class="p-4 border-t border-white/5 text-[10px] font-bold text-gray-600 uppercase tracking-widest">
                krnl
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col relative">
            <!-- Toolbar -->
            <div id="toolbar" class="bg-editor-main h-12 flex items-center justify-between px-4 border-b border-black/20 relative">
                <div class="flex items-center space-x-2">
                    <!-- Cartridge Icon (Save) -->
                    <div onclick="saveActiveScript()" class="p-2 icon-btn rounded text-gray-400" title="Save to Library">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                    </div>
                    <!-- Syringe Icon (Attach) -->
                    <div onclick="attachProcess()" class="p-2 icon-btn rounded text-gray-400" title="Attach">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 2 4 4"></path><path d="m17 7 3-3"></path><path d="M19 9 8.7 19.3c-1 1-2.5 1-3.4 0l-.6-.6c-1-1-1-2.5 0-3.4L15 5"></path><path d="m9 11 4 4"></path><path d="m5 19-3 3"></path><path d="m14 4 6 6"></path></svg>
                    </div>
                </div>

                <div class="flex items-center">
                    <!-- Execute (Gray by default, Blue on click/execution) -->
                    <div id="exec-btn" onclick="executeScript()" class="p-2 icon-btn rounded text-gray-500" title="Execute">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>
                    </div>
                </div>
            </div>

            <main class="flex-grow relative overflow-hidden bg-editor-main">
                <div id="editor-pane" class="w-full h-full">
                    <div id="container" class="w-full h-full"></div>
                </div>

                <!-- Saved Scripts Pane -->
                <div id="scripts-pane" class="w-full h-full absolute inset-0 bg-editor-main hidden-pane overflow-y-auto p-6">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex flex-col">
                            <h2 class="text-xl font-semibold text-white">Script Dashboard</h2>
                            <span class="text-[10px] text-gray-500 uppercase tracking-widest">Manage your library</span>
                        </div>
                        <div class="flex items-center space-x-4">
                            <button onclick="promptCreateScript()" class="bg-[#007acc] hover:bg-[#005fa3] text-white text-xs px-4 py-2 rounded font-medium flex items-center space-x-2 transition-all">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                <span>Create New</span>
                            </button>
                            <button onclick="switchView('editor')" class="text-xs text-gray-500 hover:text-white transition-colors">Back to Editor</button>
                        </div>
                    </div>
                    <div id="scripts-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <!-- Scripts injected here -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- SIMPLE MODAL FOR NAMING -->
    <div id="modal-overlay" class="fixed inset-0 flex items-center justify-center">
        <div class="bg-[#252526] p-6 rounded-lg border border-white/10 w-80 shadow-2xl">
            <h3 class="text-white font-medium mb-4">New Script Name</h3>
            <input id="new-script-name" type="text" class="w-full bg-[#1a1a1a] border border-[#007acc] rounded p-2 text-white outline-none mb-4" placeholder="e.g. Farm Script">
            <div class="flex justify-end gap-3">
                <button onclick="closeModal()" class="text-gray-500 hover:text-white text-sm">Cancel</button>
                <button onclick="confirmCreateScript()" class="bg-[#007acc] text-white px-4 py-1 rounded text-sm hover:bg-[#005fa3]">Create</button>
            </div>
        </div>
    </div>

    <script>
        let editor;
        const defaultScript = `-- Made by Azurion UI Pro\nprint("Hello World")`;
        
        let tabs = JSON.parse(localStorage.getItem('azurion_tabs')) || [
            { id: 1, name: 'Untitled 1', content: defaultScript }
        ];
        let activeTabId = JSON.parse(localStorage.getItem('azurion_active_tab')) || tabs[0].id;
        
        let savedScripts = JSON.parse(localStorage.getItem('azurion_saved_files')) || [
            { id: 101, name: 'Infinite Yield', content: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source"))()' },
            { id: 102, name: 'Dex Explorer', content: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/infyiff/backup/main/dex.lua"))()' }
        ];

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            monaco.editor.defineTheme('krnlTheme', {
                base: 'vs-dark', inherit: true, rules: [],
                colors: { 'editor.background': '#1a1a1a', 'editor.lineHighlightBackground': '#252526' }
            });

            const currentTab = tabs.find(t => t.id === activeTabId) || tabs[0];

            editor = monaco.editor.create(document.getElementById('container'), {
                value: currentTab.content,
                language: 'lua',
                theme: 'krnlTheme',
                automaticLayout: true,
                minimap: { enabled: false },
                cursorSmoothCaretAnimation: "on",
                smoothScrolling: true,
                fontFamily: "'Cascadia Code', Consolas, 'Courier New', monospace",
                fontSize: 14,
                padding: { top: 10 }
            });

            editor.onDidChangeModelContent(() => {
                const tab = tabs.find(t => t.id === activeTabId);
                if (tab) {
                    tab.content = editor.getValue();
                    saveToLocal();
                }
            });

            renderTabs();
        });

        // VIEW NAVIGATION
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('hidden-pane');
            if (editor) editor.layout();
        }

        function switchView(view) {
            const editorPane = document.getElementById('editor-pane');
            const scriptsPane = document.getElementById('scripts-pane');
            const toolbar = document.getElementById('toolbar');
            const navEditor = document.getElementById('nav-editor');
            const navScripts = document.getElementById('nav-scripts');

            if (view === 'editor') {
                editorPane.classList.remove('hidden-pane');
                toolbar.classList.remove('hidden-pane');
                scriptsPane.classList.add('hidden-pane');
                navEditor.classList.add('active');
                navScripts.classList.remove('active');
                if (editor) editor.layout();
            } else {
                editorPane.classList.add('hidden-pane');
                toolbar.classList.add('hidden-pane');
                scriptsPane.classList.remove('hidden-pane');
                navEditor.classList.remove('active');
                navScripts.classList.add('active');
                renderSavedScripts();
            }
        }

        // TAB MANAGEMENT
        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';
            
            tabs.forEach(t => {
                const isSelected = t.id === activeTabId;
                const tabDiv = document.createElement('div');
                tabDiv.className = `tab h-full flex items-center px-4 text-xs cursor-pointer border-r border-black/20 ${isSelected ? 'bg-tab-active border-accent text-white font-medium' : 'bg-tab-inactive text-gray-500 hover:text-gray-300'}`;
                
                const span = document.createElement('span');
                span.className = 'truncate pointer-events-none mr-2';
                span.textContent = t.name;

                tabDiv.ondblclick = (e) => {
                    e.stopPropagation();
                    renameTab(t.id, span);
                };

                tabDiv.onclick = () => switchTab(t.id);
                
                const closeBtn = document.createElement('span');
                closeBtn.innerHTML = '✕';
                closeBtn.className = 'text-gray-600 hover:text-red-400 ml-auto w-5 h-5 flex items-center justify-center rounded-sm transition-all';
                closeBtn.onclick = (e) => {
                    e.stopPropagation();
                    closeTab(t.id);
                };

                tabDiv.appendChild(span);
                tabDiv.appendChild(closeBtn);
                container.appendChild(tabDiv);
            });
        }

        function switchTab(id) {
            if (activeTabId === id) return;
            const oldTab = tabs.find(t => t.id === activeTabId);
            if(oldTab) oldTab.content = editor.getValue();
            activeTabId = id;
            const next = tabs.find(t => t.id === id);
            editor.setValue(next.content);
            renderTabs();
            saveToLocal();
        }

        function addNewTab() {
            const id = Date.now();
            tabs.push({ id, name: `Untitled ${tabs.length + 1}`, content: defaultScript });
            activeTabId = id;
            editor.setValue(defaultScript);
            switchView('editor');
            renderTabs();
            saveToLocal();
        }

        function closeTab(id) {
            if (tabs.length === 1) return;
            const index = tabs.findIndex(t => t.id === id);
            tabs = tabs.filter(t => t.id !== id);
            if (activeTabId === id) {
                activeTabId = tabs[Math.max(0, index - 1)].id;
                editor.setValue(tabs.find(t => t.id === activeTabId).content);
            }
            renderTabs();
            saveToLocal();
        }

        function renameTab(id, span) {
            const currentName = span.textContent;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentName;
            input.className = 'tab-rename-input';
            
            span.replaceWith(input);
            input.focus();
            input.select();

            const finishRename = () => {
                const newName = input.value.trim() || currentName;
                const tab = tabs.find(t => t.id === id);
                if (tab) tab.name = newName;
                renderTabs();
                saveToLocal();
            };

            input.onblur = finishRename;
            input.onkeydown = (e) => { if (e.key === 'Enter') finishRename(); };
        }

        // SAVE LOGIC
        function saveActiveScript() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab) return;
            
            const existingIndex = savedScripts.findIndex(s => s.name === tab.name);
            if (existingIndex !== -1) {
                savedScripts[existingIndex].content = editor.getValue();
            } else {
                savedScripts.push({
                    id: Date.now().toString(),
                    name: tab.name,
                    content: editor.getValue()
                });
            }
            
            localStorage.setItem('azurion_saved_files', JSON.stringify(savedScripts));
            
            // Visual feedback
            const saveBtn = document.querySelector('[title="Save to Library"]');
            saveBtn.style.color = '#10b981'; // Green
            setTimeout(() => saveBtn.style.color = '', 1000);
        }

        // CREATE SCRIPT LOGIC
        function promptCreateScript() {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('new-script-name').focus();
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('new-script-name').value = '';
        }

        function confirmCreateScript() {
            const nameInput = document.getElementById('new-script-name');
            const name = nameInput.value.trim() || "New Script";
            
            const newScript = {
                id: Date.now().toString(),
                name: name,
                content: "-- New script created\nprint('Running " + name + "')"
            };
            
            savedScripts.push(newScript);
            localStorage.setItem('azurion_saved_files', JSON.stringify(savedScripts));
            
            closeModal();
            renderSavedScripts();
        }

        // DASHBOARD FUNCTIONS
        function renderSavedScripts() {
            const grid = document.getElementById('scripts-grid');
            grid.innerHTML = '';
            
            savedScripts.forEach(script => {
                const card = document.createElement('div');
                card.className = "bg-[#2d2d2d] p-4 rounded-lg border border-white/5 hover:border-blue-500/50 transition-all flex flex-col justify-between group";
                card.innerHTML = `
                    <div>
                        <h3 class="text-white font-medium mb-1 truncate">${script.name}</h3>
                        <p class="text-gray-500 text-[10px] uppercase">Library Item</p>
                    </div>
                    <div class="mt-4 flex gap-2">
                        <button onclick="executeSaved('${script.id}')" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white text-xs py-2 rounded font-medium transition-colors">Execute</button>
                        <button onclick="editSaved('${script.id}')" class="px-3 bg-white/5 hover:bg-white/10 text-gray-300 text-xs py-2 rounded transition-colors">Edit</button>
                        <button onclick="deleteSaved('${script.id}')" class="px-3 hover:text-red-500 text-gray-500 text-xs transition-opacity group-hover:opacity-100 opacity-0">✕</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function executeSaved(id) {
            const script = savedScripts.find(s => s.id == id);
            if (script) {
                if (window.chrome?.webview) {
                    window.chrome.webview.postMessage({ action: 'execute', script: script.content });
                } else {
                    console.log("Dashboard Exec:", script.name);
                }
            }
        }

        function editSaved(id) {
            const script = savedScripts.find(s => s.id == id);
            if (script) {
                let existingTab = tabs.find(t => t.name === script.name);
                if (existingTab) {
                    switchTab(existingTab.id);
                } else {
                    addNewTab();
                    const tab = tabs.find(t => t.id === activeTabId);
                    tab.name = script.name;
                    tab.content = script.content;
                    editor.setValue(script.content);
                }
                switchView('editor');
                renderTabs();
            }
        }

        function deleteSaved(id) {
            savedScripts = savedScripts.filter(s => s.id != id);
            localStorage.setItem('azurion_saved_files', JSON.stringify(savedScripts));
            renderSavedScripts();
        }

        // CORE ACTIONS
        function executeScript() {
            const code = editor.getValue();
            const btn = document.getElementById('exec-btn');
            
            // Visual feedback for execution
            btn.classList.add('exec-active');
            
            if (window.chrome?.webview) {
                window.chrome.webview.postMessage({ action: 'execute', script: code });
            } else {
                console.log("Executing:", code);
            }
            
            // Reset color after a brief moment (simulate processing)
            setTimeout(() => {
                btn.classList.remove('exec-active');
            }, 500);
        }

        function saveToLocal() {
            localStorage.setItem('azurion_tabs', JSON.stringify(tabs));
            localStorage.setItem('azurion_active_tab', JSON.stringify(activeTabId));
        }

        function windowAction(action) {
            if (window.chrome?.webview) window.chrome.webview.postMessage({ action: action });
        }

        function handleResize(e, direction) {
            if (window.chrome?.webview) window.chrome.webview.postMessage({ action: 'resize', direction: direction });
        }

        function checkDrag(e) {
            if (e.target.closest('.icon-btn') || e.target.closest('.tab') || e.target.closest('.resizer') || e.target.closest('.nav-item') || e.target.closest('#modal-overlay') || e.target.closest('button')) return;
            if (e.target.tagName === 'HEADER' || e.target.parentElement?.tagName === 'HEADER') {
                if (window.chrome?.webview) window.chrome.webview.postMessage({ action: 'drag' });
            }
        }

        function attachProcess() {
            if (window.chrome?.webview) window.chrome.webview.postMessage({ action: 'attach' });
        }

        window.addEventListener('resize', () => editor && editor.layout());
    </script>
</body>
</html>
