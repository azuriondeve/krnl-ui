<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executor UI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

<style>
body{
background:#1a1a1a;
color:#d4d4d4;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
font-family:Segoe UI;
overflow:hidden;
}

.bg-header{background:#252526}
.bg-editor{background:#1a1a1a}

.icon-btn{
cursor:pointer;
opacity:.7;
padding:8px;
}

.icon-btn:hover{
opacity:1;
background:rgba(255,255,255,.05)
}

#container{
width:100%;
height:100%;
}
</style>
</head>

<body onmousedown="dragCheck(event)">

<!-- HEADER -->
<header class="bg-header h-9 flex items-center justify-between select-none">

<div class="flex items-center h-full px-2 space-x-1">

<!-- ATTACH -->
<div onclick="attachProcess()" class="icon-btn text-gray-400">
🔌
</div>

</div>

<div class="flex items-center h-full">

<!-- MINIMIZE -->
<div onclick="windowAction('minimize')" class="icon-btn text-gray-400">
—
</div>

<!-- MAXIMIZE -->
<div onclick="windowAction('maximize')" class="icon-btn text-gray-400">
□
</div>

<!-- CLOSE -->
<div onclick="windowAction('close')" class="icon-btn text-gray-400 hover:bg-red-600">
✕
</div>

</div>

</header>

<!-- TOOLBAR -->
<div class="bg-editor h-10 flex items-center justify-end px-3 border-b border-black/30">

<div onclick="executeScript()" class="icon-btn text-gray-400 hover:text-green-500">
▶
</div>

</div>

<!-- EDITOR -->
<main class="flex-grow bg-editor">
<div id="container"></div>
</main>

<script>

let editor;

require.config({
paths:{'vs':'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs'}
});

require(['vs/editor/editor.main'],function(){

editor=monaco.editor.create(document.getElementById('container'),{

value:`print("executor ready")`,

language:'lua',

theme:'vs-dark',

automaticLayout:true,

minimap:{enabled:false}

});

});


// ==========================
// ATTACH
// ==========================

function attachProcess(){

window.chrome.webview.postMessage({

action:"attach"

});

}


// ==========================
// EXECUTE
// ==========================

function executeScript(){

const code=editor.getValue();

window.chrome.webview.postMessage({

action:"execute",
script:code

});

}


// ==========================
// WINDOW CONTROLS
// ==========================

function windowAction(a){

window.chrome.webview.postMessage({

action:a

});

}


// ==========================
// DRAG WINDOW
// ==========================

function dragCheck(e){

if(e.target.tagName==="HEADER"||e.target.parentElement?.tagName==="HEADER"){

window.chrome.webview.postMessage({

action:"drag"

});

}

}

</script>

</body>
</html>
