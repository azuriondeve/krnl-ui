<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>executor-krnl</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: #d4d4d4; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            position: relative;
        }
        
        .bg-editor-main { background-color: #1a1a1a; }
        .bg-header { background-color: #252526; }
        .bg-tab-active { background-color: #1a1a1a; border-top: 2px solid #007acc; }
        .bg-tab-inactive { background-color: #2d2d2d; opacity: 0.6; }
        
        ::-webkit-scrollbar { height: 3px; width: 6px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #007acc; }

        .icon-btn { 
            transition: all 0.2s ease; 
            cursor: pointer; 
        }
        .icon-btn:hover { 
            background: rgba(255,255,255,0.08); 
            color: #fff;
        }

        /* Áreas de Resize para bater com o C# */
        .resizer { position: absolute; z-index: 9999; }
        .resizer.top { top: 0; left: 0; width: 100%; height: 4px; cursor: n-resize; }
        .resizer.bottom { bottom: 0; left: 0; width: 100%; height: 4px; cursor: s-resize; }
        .resizer.left { top: 0; left: 0; width: 4px; height: 100%; cursor: w-resize; }
        .resizer.right { top: 0; right: 0; width: 4px; height: 100%; cursor: e-resize; }
        .resizer.top-left { top: 0; left: 0; width: 10px; height: 10px; cursor: nw-resize; }
        .resizer.top-right { top: 0; right: 0; width: 10px; height: 10px; cursor: ne-resize; }
        .resizer.bottom-left { bottom: 0; left: 0; width: 10px; height: 10px; cursor: sw-resize; }
        .resizer.bottom-right { bottom: 0; right: 0; width: 10px; height: 10px; cursor: se-resize; }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 10px;
            top: 45px;
            background: #252526;
            min-width: 200px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            z-index: 1000;
            border: 1px solid #333;
            border-radius: 4px;
        }
        .dropdown-content button {
            width: 100%;
            text-align: left;
            padding: 8px 12px;
            font-size: 12px;
            color: #ccc;
            border: none;
            background: none;
            cursor: pointer;
        }
        .dropdown-content button:hover {
            background: #3e3e42;
            color: white;
        }
    </style>
</head>
<body onmousedown="checkDrag(event)">

    <!-- Handles de Redimensionamento -->
    <div class="resizer top" onmousedown="handleResize(event, 'top')"></div>
    <div class="resizer bottom" onmousedown="handleResize(event, 'bottom')"></div>
    <div class="resizer left" onmousedown="handleResize(event, 'left')"></div>
    <div class="resizer right" onmousedown="handleResize(event, 'right')"></div>
    <div class="resizer top-left" onmousedown="handleResize(event, 'top-left')"></div>
    <div class="resizer top-right" onmousedown="handleResize(event, 'top-right')"></div>
    <div class="resizer bottom-left" onmousedown="handleResize(event, 'bottom-left')"></div>
    <div class="resizer bottom-right" onmousedown="handleResize(event, 'bottom-right')"></div>

    <!-- Barra de Título / Abas -->
    <header class="bg-header h-9 flex items-center justify-between select-none border-b border-black/40">
        <div class="flex items-center h-full overflow-hidden flex-1">
            <div class="px-3 h-full flex items-center text-blue-500 font-bold text-xs tracking-widest">
                AZURION
            </div>
            
            <div id="tabs-container" class="flex h-full items-center"></div>

            <div onclick="addNewTab()" class="px-3 h-full flex items-center text-gray-500 hover:text-white cursor-pointer hover:bg-white/5 transition-colors">
                <span class="text-lg">+</span>
            </div>
        </div>

        <!-- Botões de Controle (Mapeados para seu C#) -->
        <div class="flex items-center h-full flex-shrink-0">
            <div onclick="windowAction('minimize')" class="px-4 h-full flex items-center hover:bg-white/10 cursor-pointer text-gray-400">
                <div class="w-3 h-[1px] bg-current"></div>
            </div>
            <div onclick="windowAction('maximize')" class="px-4 h-full flex items-center hover:bg-white/10 cursor-pointer text-gray-400">
                <div class="w-3 h-3 border border-current"></div>
            </div>
            <div onclick="windowAction('close')" class="px-4 h-full flex items-center hover:bg-red-600 cursor-pointer text-gray-400 hover:text-white transition-all">
                <span class="text-sm">✕</span>
            </div>
        </div>
    </header>

    <!-- Barra de Ações -->
    <div class="bg-editor-main h-11 flex items-center justify-between px-3 border-b border-black/20">
        <div class="flex items-center space-x-2">
            <button onclick="attachProcess()" class="flex items-center space-x-2 bg-blue-600/20 hover:bg-blue-600/40 text-blue-400 px-3 py-1 rounded text-xs border border-blue-500/30 transition-all">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m18 2 4 4m-5 1 3-3M19 9 8.7 19.3c-1 1-2.5 1-3.4 0l-.6-.6c-1-1-1-2.5 0-3.4L15 5m-6 6 4 4m-8 8-3 3m12-18 6 6"/></svg>
                <span>ATTACH</span>
            </button>

            <button onclick="executeScript()" class="flex items-center space-x-2 bg-green-600/20 hover:bg-green-600/40 text-green-400 px-3 py-1 rounded text-xs border border-green-500/30 transition-all">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                <span>EXECUTE</span>
            </button>
            
            <button onclick="clearEditor()" class="px-3 py-1 text-xs text-gray-500 hover:text-white transition-colors">CLEAR</button>
        </div>

        <!-- Script Dropdown -->
        <div class="relative inline-block text-left">
            <button onclick="toggleDropdown()" class="flex items-center space-x-1 text-xs bg-white/5 hover:bg-white/10 px-3 py-1 rounded text-gray-400 border border-white/10">
                <span>Cloud Scripts</span>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
            </button>
            <div id="scriptDropdown" class="dropdown-content">
                <button onclick="loadQuickScript('fly')">✈️ Infinite Yield (Fly/Admin)</button>
                <button onclick="loadQuickScript('esp')">👁️ Simple ESP</button>
                <button onclick="loadQuickScript('speed')">⚡ Speed Hub</button>
                <button onclick="loadQuickScript('dex')">🛠️ Dark Dex V3</button>
                <button onclick="loadQuickScript('remote')">📡 Remote Spy</button>
            </div>
        </div>
    </div>

    <main class="flex-grow relative overflow-hidden bg-editor-main">
        <div id="container"></div>
    </main>

    <script>
        let editor;
        const defaultScript = `-- Azurion Executor\nprint("Welcome back!")`;
        
        // Scripts Rápidos em Lua
        const quickScripts = {
            fly: `loadstring(game:HttpGet('https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source'))()`,
            esp: `-- Simple Box ESP\nfor i,v in pairs(game.Players:GetChildren()) do\n    print("ESP Loaded for: " .. v.Name)\nend`,
            speed: `game.Players.LocalPlayer.Character.Humanoid.WalkSpeed = 100`,
            dex: `loadstring(game:HttpGet("https://raw.githubusercontent.com/Babyhamsta/RBLX_Scripts/main/Universal/DarkDexV3.lua"))()`,
            remote: `loadstring(game:HttpGet("https://raw.githubusercontent.com/exxtremestuffs/SimpleSpyV3/main/main.lua"))()`
        };

        let tabs = JSON.parse(localStorage.getItem('krnl_tabs')) || [
            { id: 1, name: 'Untitled 1', content: defaultScript }
        ];
        let activeTabId = JSON.parse(localStorage.getItem('krnl_active_tab')) || tabs[0].id;

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            monaco.editor.defineTheme('azurionTheme', {
                base: 'vs-dark', inherit: true, rules: [],
                colors: { 'editor.background': '#1a1a1a', 'editor.lineHighlightBackground': '#252526' }
            });

            const currentTab = tabs.find(t => t.id === activeTabId) || tabs[0];

            editor = monaco.editor.create(document.getElementById('container'), {
                value: currentTab.content,
                language: 'lua',
                theme: 'azurionTheme',
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 14,
                fontFamily: "'Cascadia Code', Consolas, monospace"
            });

            editor.onDidChangeModelContent(() => {
                const tab = tabs.find(t => t.id === activeTabId);
                if (tab) {
                    tab.content = editor.getValue();
                    saveToLocal();
                }
            });

            renderTabs();
        });

        function saveToLocal() {
            localStorage.setItem('krnl_tabs', JSON.stringify(tabs));
            localStorage.setItem('krnl_active_tab', JSON.stringify(activeTabId));
        }

        // Envio de mensagens para o C#
        function windowAction(action) {
            if (window.chrome?.webview) {
                // Seu C# espera um objeto WebMessage JSON
                window.chrome.webview.postMessage({ action: action });
            }
        }

        function handleResize(e, direction) {
            e.preventDefault();
            if (window.chrome?.webview) {
                window.chrome.webview.postMessage({ action: 'resize', direction: direction });
            }
        }

        function checkDrag(e) {
            // Se clicar na Header, dispara o drag no C#
            if (e.target.closest('header')) {
                if (e.target.closest('.icon-btn') || e.target.closest('.tab') || e.target.closest('button')) return;
                if (window.chrome?.webview) {
                    window.chrome.webview.postMessage({ action: 'drag' });
                }
            }
        }

        function attachProcess() {
            if (window.chrome?.webview) window.chrome.webview.postMessage({ action: 'attach' });
        }

        function executeScript() {
            const code = editor.getValue();
            if (window.chrome?.webview) {
                window.chrome.webview.postMessage({ action: 'execute', script: code });
            }
        }

        function clearEditor() {
            editor.setValue("");
        }

        function toggleDropdown() {
            document.getElementById("scriptDropdown").style.display = 
                document.getElementById("scriptDropdown").style.display === "block" ? "none" : "block";
        }

        function loadQuickScript(key) {
            editor.setValue(quickScripts[key]);
            toggleDropdown();
        }

        // Fechar dropdown ao clicar fora
        window.onclick = function(event) {
            if (!event.target.closest('.relative')) {
                document.getElementById("scriptDropdown").style.display = "none";
            }
        }

        // Sistema de Abas
        function addNewTab() {
            const id = Date.now();
            tabs.push({ id, name: `Script ${tabs.length + 1}`, content: '-- New Script' });
            switchTab(id);
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';
            tabs.forEach(t => {
                const isSelected = t.id === activeTabId;
                const tabDiv = document.createElement('div');
                tabDiv.className = `tab h-full flex items-center px-4 text-[10px] cursor-pointer border-r border-black/20 font-medium tracking-tight ${isSelected ? 'bg-tab-active text-white' : 'bg-tab-inactive text-gray-500'}`;
                
                const span = document.createElement('span');
                span.textContent = t.name.toUpperCase();
                tabDiv.onclick = () => switchTab(t.id);
                
                const closeBtn = document.createElement('span');
                closeBtn.innerHTML = '✕';
                closeBtn.className = 'ml-3 hover:text-red-500 transition-colors';
                closeBtn.onclick = (e) => { e.stopPropagation(); closeTab(t.id); };

                tabDiv.appendChild(span);
                tabDiv.appendChild(closeBtn);
                container.appendChild(tabDiv);
            });
        }

        function switchTab(id) {
            activeTabId = id;
            const tab = tabs.find(t => t.id === id);
            editor.setValue(tab.content);
            renderTabs();
            saveToLocal();
        }

        function closeTab(id) {
            if (tabs.length === 1) return;
            tabs = tabs.filter(t => t.id !== id);
            if (activeTabId === id) activeTabId = tabs[0].id;
            switchTab(activeTabId);
        }

        window.addEventListener('resize', () => editor && editor.layout());
    </script>
</body>
</html>
