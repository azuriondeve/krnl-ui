<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRNL | 2026 Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
            margin: 0;
        }

        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
        }

        .glow-button {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }

        .glow-button:hover {
            box-shadow: 0 0 30px rgba(37, 99, 235, 0.6);
            transform: scale(1.05);
        }

        #music-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.6s ease;
        }

        .hidden-overlay {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <!-- Fundo de Partículas Dinâmicas -->
    <canvas id="canvas-bg"></canvas>

    <!-- Overlay de Ativação de Música -->
    <div id="music-overlay">
        <div class="text-center p-10 glass-card max-w-sm border-blue-500/20">
            <h2 class="text-3xl font-extrabold mb-2 tracking-tight">KRNL <span class="text-blue-500">2026</span></h2>
            <p class="text-gray-400 mb-8 text-sm leading-relaxed">Click below to initialize the Azurion engine and audio stream.</p>
            <button onclick="startExperience()" class="glow-button text-white px-10 py-4 rounded-xl font-bold w-full uppercase tracking-widest text-sm">
                Initialize
            </button>
        </div>
    </div>

    <!-- Player de Áudio -->
    <audio id="bg-audio" loop>
        <source src="https://raw.githubusercontent.com/azuriondeve/krnl-ui/main/webpage/music.mp3" type="audio/mpeg">
    </audio>

    <!-- Conteúdo Principal -->
    <main class="max-w-4xl w-full text-center z-10">
        
        <!-- Cabeçalho -->
        <div class="mb-12">
            <h1 class="text-7xl md:text-9xl font-black tracking-tighter mb-8 bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-500">
                KRNL
            </h1>
        </div>

        <!-- Seção de Download -->
        <div class="glass-card p-10 md:p-16 mb-16 relative overflow-hidden">
            <div class="relative z-10">
                <h3 class="text-3xl font-bold mb-4 uppercase tracking-tight">Elevate Your Performance</h3>
                <p class="text-gray-400 mb-10 max-w-md mx-auto">Experience the most stable and optimized environment for 2026 execution.</p>
                
                <a href="https://github.com/azuriondeve/krnl-ui/releases/latest/download/bootstrapper.exe" 
                   class="glow-button inline-flex items-center justify-center text-white px-12 py-6 rounded-2xl text-2xl font-black gap-4 group">
                    <span>DOWNLOAD</span>
                    <svg class="w-7 h-7 transform group-hover:translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
                    </svg>
                </a>
            </div>
        </div>

        <!-- Rodapé -->
        <footer class="text-gray-500 text-sm tracking-wide">
            <p class="mb-6">&copy; 2026 <span class="text-white font-semibold">Azurion Group</span>. All rights reserved.</p>
            <div class="flex justify-center gap-8 opacity-60 hover:opacity-100 transition-opacity">
                <a href="https://azuriondeve.github.io/krnl-ui/discord.html" target="_blank" class="hover:text-blue-500 transition-colors uppercase font-bold tracking-widest text-xs">Discord Server</a>
            </div>
        </footer>
    </main>

    <script>
        // Lógica do Fundo de Partículas
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.init();
            }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.color = `rgba(37, 99, 235, ${Math.random() * 0.3})`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0 || this.y > canvas.height || this.y < 0) {
                    this.init();
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Lógica de Áudio e Overlay
        function startExperience() {
            const audio = document.getElementById('bg-audio');
            const overlay = document.getElementById('music-overlay');
            
            audio.volume = 0.4;
            audio.play().catch(e => console.error("Audio playback blocked:", e));
            
            overlay.classList.add('hidden-overlay');
        }
    </script>
</body>
</html>
